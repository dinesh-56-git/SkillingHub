<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Schedule Meeting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 class="mb-3">📅 Schedule Meeting</h3>

        <form action="/schedule/save" method="post">

            <input type="hidden" name="requestId" th:value="${requestId}">

            <label>Select Date</label>
            <input type="date" name="date" class="form-control mb-3" required>

            <label>Select Time</label>
            <input type="time" name="time" class="form-control mb-3" required>

            <button class="btn btn-success">Confirm Schedule</button>
            <input type="text" name="link" 
       placeholder="Paste Google Meet / Zoom link"
       class="form-control mb-3">

        </form>
        <div id="calendar"></div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        { initialView: 'dayGridMonth' }
    );
    calendar.render();
});
</script>

    </div>

</div>

</body>
</html>
