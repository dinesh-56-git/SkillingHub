<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="/dashboard" class="navbar-brand">Skill Exchange</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4 text-center">User Profile</h3>

        <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>

        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>

        <p><strong>Credits:</strong> 
            <span class="badge bg-success" th:text="${user.credits}"></span>
        </p>

        <p><strong>Trust Score:</strong> 
            <span class="badge bg-primary" th:text="${user.trustScore}"></span>
        </p>

        <div class="text-center mt-3">
            <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
        </div>
        <div class="text-center mt-3">
    <a href="/edit-profile" class="btn btn-warning">Edit Profile</a>
</div>

    </div>

</div>

</body>
</html>
