<!DOCTYPE html>
<html>
<head>
    <title>Send Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4">Send Skill Request</h2>

        <form action="/send-request" method="post">
            <input type="text" name="skill" class="form-control mb-3" placeholder="Enter Skill">

            <button class="btn btn-primary">Send Request</button>
        </form>

        <a href="/dashboard" class="btn btn-link mt-3">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
