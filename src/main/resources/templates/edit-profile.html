<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4">Edit Profile</h3>

        <form action="/update-profile" method="post">

            <input type="hidden" th:value="${user.id}" name="id"/>

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" th:value="${user.name}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" th:value="${user.email}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="text" name="password" th:value="${user.password}" class="form-control">
            </div>

            <button class="btn btn-success w-100">Update Profile</button>

        </form>

        <div class="text-center mt-3">
            <a href="/profile" class="btn btn-secondary">Back</a>
        </div>

    </div>

</div>

</body>
</html>
