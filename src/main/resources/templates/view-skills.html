<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Skills</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Skill Exchange Platform</a>

        <div>
            <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/add-skill" class="btn btn-outline-success me-2">Add Skill</a>
            <a href="/view-skills" class="btn btn-outline-primary me-2">View Skills</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- ✅ MAIN CONTENT -->
<div class="container mt-5">

    <h2 class="text-center mb-4">All Skills</h2>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped table-hover text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Skill Name</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <!-- ✅ ONLY ONE LOOP -->
                    <tr th:each="skill : ${skills}">
                        <td th:text="${skill.id}"></td>
                        <td th:text="${skill.skillName}"></td>

                        <td>
                            <a th:href="@{/delete-skill/{id}(id=${skill.id})}" 
                               class="btn btn-danger btn-sm">
                               Delete
                            </a>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
