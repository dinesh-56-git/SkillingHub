<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Skills</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">All Skills</h2>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped table-hover text-center">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Skill Name</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="skill : ${skills}">
                        <td th:text="${skill.id}"></td>
                        <td th:text="${skill.skillName}"></td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Skill Barter</a>

        <div>
            <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/add-skill" class="btn btn-outline-success me-2">Add Skill</a>
            <a href="/view-skills" class="btn btn-outline-primary me-2">View Skills</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-5">

    <h3>All Skills</h3>

    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Skill Name</th>
        </tr>

        <tr th:each="s : ${skills}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.skillName}"></td>
        </tr>
    </table>

</div>

</div>


</body>
</html>
