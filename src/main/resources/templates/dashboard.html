<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Dashboard</h2>
    <h4 class="text-end">
    Welcome, <span th:text="${username}"></span> 👋
</h4>

    <!-- Navigation -->
    <div class="text-center mb-4">
        <a href="/add-skill" class="btn btn-success">Add Skill</a>
        <a href="/view-skills" class="btn btn-primary">View Skills</a>
        <a href="/send-request" class="btn btn-warning">Send Request</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="row">

        <!-- Chart 1 -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="text-center">Skills Overview</h5>
                    <canvas id="skillsChart"></canvas>
                </div>
            </div>
        </div>
        <div class="container mt-4">
    <div class="card shadow p-4">
    <h5>Welcome to Dashboard</h5>
</div>
</div>

        <!-- Chart 2 -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="text-center">User Activity</h5>
                    <canvas id="activityChart"></canvas>
                </div>
            </div>
        </div>

    </div>

</div>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Skill Barter</a>

        <div>
            <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/add-skill" class="btn btn-outline-success me-2">Add Skill</a>
            <a href="/view-skills" class="btn btn-outline-primary me-2">View Skills</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<script>
    // Skills Chart
    const skillsChart = new Chart(document.getElementById('skillsChart'), {
        type: 'bar',
        data: {
            labels: ['Java', 'Python', 'UI/UX'],
            datasets: [{
                label: 'Skills Count',
                data: [5, 3, 2],
                backgroundColor: ['blue', 'green', 'orange']
            }]
        }
    });

    // Activity Chart
    const activityChart = new Chart(document.getElementById('activityChart'), {
        type: 'pie',
        data: {
            labels: ['Completed', 'Pending', 'Cancelled'],
            datasets: [{
                data: [4, 2, 1],
                backgroundColor: ['green', 'yellow', 'red']
            }]
        }
    });
</script>

</body>
</html>
