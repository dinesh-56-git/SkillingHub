<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">SkillingHub</a>

        <div class="d-flex align-items-center">

            <!-- Profile -->
            <a href="/profile" class="btn btn-outline-info me-2">Profile</a>

            <!-- Logout -->
            <a href="/logout" class="btn btn-outline-danger">Logout</a>

        </div>
    </div>
</nav>

<!-- ✅ MAIN CONTENT -->
<div class="container mt-5">

    <h2 class="text-center mb-4">Dashboard</h2>

    <!-- ✅ USER INFO -->
    <div class="card p-3 mb-3">
        <h5>Welcome, <span th:text="${user.name}"></span> 👋</h5>

        <p>Credits: 
            <span class="badge bg-success" th:text="${user.credits}"></span>
        </p>

        <p>Trust Score: 
            <span class="badge bg-primary" th:text="${user.trustScore}"></span>
        </p>
    </div>

    <!-- 🔔 ✅ NOTIFICATIONS -->
    <div class="card p-3 mb-3">
        <h5>
            Notifications 🔔 
            <span class="badge bg-danger" th:text="${notifications.size()}"></span>
        </h5>

        <ul class="list-group">
            <li class="list-group-item"
                th:each="n : ${notifications}">
                <span th:text="${n.message}"></span>
            </li>
        </ul>
    </div>

    <!-- ✅ ACTION BUTTONS -->
    <div class="text-center mb-4">
        <a href="/add-skill" class="btn btn-success">Add Skill</a>
        <a href="/view-skills" class="btn btn-primary">View Skills</a>
        <a href="/send-request" class="btn btn-warning">Send Request</a>
        <a href="/view-requests" class="btn btn-info">View Requests</a>
    </div>

    <!-- ✅ STATS -->
    <div class="card p-3 mb-4 text-center">
        <p>Total Skills: <span th:text="${skillCount}"></span></p>
        <p>Total Users: <span th:text="${userCount}"></span></p>
    </div>

    <!-- ✅ CHARTS -->
    <div class="row">

        <!-- Skills Chart -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="text-center">Skills Overview</h5>
                    <canvas id="skillsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Activity Chart -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="text-center">User Activity</h5>
                    <canvas id="activityChart"></canvas>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- ✅ CHART SCRIPT -->
<script>
    const skillsChart = new Chart(document.getElementById('skillsChart'), {
        type: 'bar',
        data: {
            labels: ['Java', 'Python', 'UI/UX'],
            datasets: [{
                label: 'Skills Count',
                data: [5, 3, 2],
                backgroundColor: ['blue', 'green', 'orange']
            }]
        }
    });

    const activityChart = new Chart(document.getElementById('activityChart'), {
        type: 'pie',
        data: {
            labels: ['Completed', 'Pending', 'Cancelled'],
            datasets: [{
                data: [4, 2, 1],
                backgroundColor: ['green', 'yellow', 'red']
            }]
        }
    });
</script>

</body>
</html>
