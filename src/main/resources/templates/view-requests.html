<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Requests</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">All Requests</h2>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped table-hover text-center">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Skill</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="req : ${requests}">
                        <td th:text="${req.id}"></td>
                        <td th:text="${req.skill}"></td>

                        <!-- ✅ Status Badge -->
                        <td>
                            <span class="badge bg-warning"
                                  th:if="${req.status == 'PENDING'}">PENDING</span>

                            <span class="badge bg-success"
                                  th:if="${req.status == 'ACCEPTED'}">ACCEPTED</span>
                        </td>

                        <!-- ✅ Accept Button -->
                        <td>
                            <a th:href="@{/requests/accept/{id}(id=${req.id})}"
                               class="btn btn-success btn-sm">
                               Accept
                            </a>
                        </td>
                        <td>

    <!-- Accept -->
    <a th:if="${req.status == 'PENDING'}"
       th:href="@{/requests/accept/{id}(id=${req.id})}"
       class="btn btn-success btn-sm">
       Accept
    </a>

    <!-- 📅 Schedule Meeting -->
    <a th:if="${req.status == 'ACCEPTED'}"
       th:href="@{/schedule/{id}(id=${req.id})}"
       class="btn btn-warning btn-sm">
       Schedule
    </a>

    <!-- 💬 Chat -->
    <a th:if="${req.status == 'ACCEPTED'}"
       th:href="@{/chat/{id}(id=${req.id})}"
       class="btn btn-info btn-sm">
       Chat
    </a>

</td>

 
                    </tr>
                </tbody>

            </table>

        </div>
    </div>

    <!-- Back Button -->
    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
